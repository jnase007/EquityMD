[build]
  command = "npm run build"
  publish = "dist"

# Force fresh deployment - clear cache
[build.environment]
  NODE_VERSION = "22"

# Edge Functions for SEO prerendering (bots get full HTML, users get SPA)
[[edge_functions]]
  function = "og-tags"
  path = "/"

