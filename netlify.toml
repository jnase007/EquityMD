# SPA fallback - must be last (no force — let Netlify serve real files first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Default: no-cache for ALL routes (SPA — every route serves index.html)
[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Override: cache static assets aggressively (Vite hash-busts these automatically)
[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache sitemap and robots
[[headers]]
  for = "/sitemap.xml"
    [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
    [headers.values]
    Cache-Control = "public, max-age=3600"
