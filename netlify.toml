# SEO: Redirect www to non-www (canonical domain)
[[redirects]]
  from = "https://www.equitymd.com/*"
  to = "https://equitymd.com/:splat"
  status = 301
  force = true

# NOTE: Trailing slash redirect removed — was causing redirect loops with Netlify Pretty URLs
# If Pretty URLs is OFF in Netlify dashboard, this is not needed anyway (SPA handles all routes)

# 301 Permanent redirects for old/changed URLs
[[redirects]]
  from = "/browse"
  to = "/find"
  status = 301
  force = true

# Preserve query params when redirecting browse to find
[[redirects]]
  from = "/browse?state=:state"
  to = "/find?state=:state"
  status = 301
  force = true

[[redirects]]
  from = "/browse/*"
  to = "/find"
  status = 301
  force = true

